<!DOCTYPE html>
<html>

<head>

<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:20px;
}

.logo{
width:400px;
max-width:90%;
}

/* LAYOUT */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

/* GLASS CARDS */

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:10px;
text-align:center;
}

/* PANELS */

.panel{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:10px;
margin-top:20px;
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 15px;
cursor:pointer;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
<img src="nuno-logo.png" class="logo">
</div>

<div class="container">

<div class="sidebar">

<h2>Nuno Panel</h2>

<a href="#">Dashboard</a>
<a href="#">Sales</a>
<a href="#">Investments</a>
<a href="#">Analytics</a>
<a href="#">Goals</a>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investment">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">0</p>
</div>

</div>

<div class="panel">

<h3>Add Sale</h3>

<input type="number" id="saleAmount" placeholder="Sale Amount">

<button onclick="addSale()">Add</button>

</div>

<div class="panel">

<h3>Add Investment</h3>

<input type="number" id="printing" placeholder="Printing Cost"><br>
<input type="number" id="product" placeholder="Product Purchase"><br>
<input type="number" id="packaging" placeholder="Packaging Cost"><br>
<input type="number" id="other" placeholder="Other Expense"><br>

<button onclick="addInvestment()">Add Investment</button>

</div>

<div class="panel">

<h3>Monthly Growth</h3>

<canvas id="growthChart"></canvas>

</div>

</div>

</div>

<script>

let totalSales=0;
let totalInvestment=0;

function addSale(){

let sale=Number(document.getElementById("saleAmount").value);

totalSales+=sale;

updateDashboard();

}

function addInvestment(){

let printing=Number(document.getElementById("printing").value);
let product=Number(document.getElementById("product").value);
let packaging=Number(document.getElementById("packaging").value);
let other=Number(document.getElementById("other").value);

totalInvestment+=printing+product+packaging+other;

updateDashboard();

}

function updateDashboard(){

document.getElementById("sales").innerText="₹"+totalSales;

document.getElementById("investment").innerText="₹"+totalInvestment;

let profit=totalSales-totalInvestment;

document.getElementById("profit").innerText="₹"+profit;

}

const ctx=document.getElementById('growthChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Monthly Growth',
data:[0,0,0,0,0,0],
borderWidth:3
}]
}
});

</script>

</body>
</html>
