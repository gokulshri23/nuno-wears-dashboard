<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:radial-gradient(circle,#1a1a1a,#000);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:20px;
}

.logo{
width:220px;
max-width:90%;
}

/* LAYOUT */

.container{
display:flex;
gap:20px;
padding:20px;
}

/* SIDEBAR */

.sidebar{
width:200px;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
}

.sidebar button{
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
}

/* DASHBOARD CARDS */

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
}

.card{
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

.card p{
font-size:22px;
}

/* PANELS */

.panel{
margin-top:20px;
padding:20px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
}

/* INPUTS */

input,select{
padding:8px;
margin:6px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.1);
color:white;
}

button.action{
padding:8px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.25);
color:white;
cursor:pointer;
}

/* TABLE */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

tr{
border-bottom:1px solid rgba(255,255,255,0.15);
}

/* SECTIONS */

.section{
display:none;
}

.active{
display:block;
}

/* MOBILE RESPONSIVE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
display:flex;
width:100%;
justify-content:space-around;
}

.sidebar button{
width:auto;
flex:1;
margin:5px;
}

.cards{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="header">
<img src="nuno-logo.png" class="logo">
</div>

<div class="container">

<div class="sidebar">

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('sales')">Sales</button>
<button onclick="showSection('investment')">Investment</button>
<button onclick="showSection('analytics')">Analytics</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="salesTotal">₹0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investmentTotal">₹0</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="profitTotal">₹0</p>
</div>

<div class="card">
<h3>T-shirts Sold</h3>
<p id="shirtSold">0</p>
</div>

<div class="card">
<h3>Delivery Paid</h3>
<p id="deliveryInvestment">₹0</p>
</div>

</div>

</div>

<!-- SALES -->

<div id="sales" class="section panel">

<h3>Add Sale</h3>

<input type="date" id="saleDate">

<input type="number" id="salePrice" placeholder="Selling Price">

<input type="number" id="saleQty" placeholder="T-shirt Count">

<input type="number" id="deliveryCharge" placeholder="Delivery Charge">

<select id="deliveryPaidBy">
<option value="customer">Customer Pays Delivery</option>
<option value="company">Company Pays Delivery</option>
</select>

<button class="action" onclick="addSale()">Add Sale</button>

<table>

<tr>
<th>Date</th>
<th>Price</th>
<th>Qty</th>
<th>Delivery</th>
<th>Paid By</th>
<th>Profit</th>
</tr>

<tbody id="salesTable"></tbody>

</table>

</div>

<!-- INVESTMENT -->

<div id="investment" class="section panel">

<h3>Monthly Investment</h3>

<input type="month" id="invMonth">

<input type="number" id="purchaseCost" placeholder="Purchase Cost">

<input type="number" id="printingCost" placeholder="Printing Cost">

<input type="number" id="packingCost" placeholder="Packing Cost">

<input type="number" id="shirtCount" placeholder="T-shirt Bought">

<br>

<button class="action" onclick="addInvestment()">Add Investment</button>

<table>

<tr>
<th>Month</th>
<th>Purchase</th>
<th>Printing</th>
<th>Packing</th>
<th>Qty</th>
<th>Cost/Shirt</th>
<th>Total</th>
</tr>

<tbody id="investmentTable"></tbody>

</table>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section panel">

<h3>Monthly Sales</h3>
<canvas id="salesChart"></canvas>

<br><br>

<h3>Monthly Profit</h3>
<canvas id="profitChart"></canvas>

</div>

</div>

</div>

<script>

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

let costPerShirt=0
let totalSales=0
let totalInvestment=0
let totalProfit=0
let deliveryInvestment=0
let shirtsSold=0

let monthlySales={}
let monthlyProfit={}

/* INVESTMENT */

function addInvestment(){

let month=document.getElementById("invMonth").value
let purchase=Number(document.getElementById("purchaseCost").value)
let printing=Number(document.getElementById("printingCost").value)
let packing=Number(document.getElementById("packingCost").value)
let qty=Number(document.getElementById("shirtCount").value)

if(!month || !purchase || !qty){
alert("Enter required fields")
return
}

let monthlyInvestment=purchase+printing+packing

costPerShirt=monthlyInvestment/qty

totalInvestment+=monthlyInvestment

document.getElementById("investmentTotal").innerText="₹"+totalInvestment

let row=`
<tr>
<td>${month}</td>
<td>₹${purchase}</td>
<td>₹${printing}</td>
<td>₹${packing}</td>
<td>${qty}</td>
<td>₹${costPerShirt.toFixed(2)}</td>
<td>₹${monthlyInvestment}</td>
</tr>
`

document.getElementById("investmentTable").innerHTML+=row

}

/* SALES */

function addSale(){

let date=document.getElementById("saleDate").value
let price=Number(document.getElementById("salePrice").value)
let qty=Number(document.getElementById("saleQty").value)
let delivery=Number(document.getElementById("deliveryCharge").value)
let paidBy=document.getElementById("deliveryPaidBy").value

if(!date || !price || !qty){
alert("Enter required fields")
return
}

let saleValue=price*qty
let profit

if(paidBy==="company"){

profit = (price - costPerShirt)*qty - delivery

deliveryInvestment += delivery
document.getElementById("deliveryInvestment").innerText="₹"+deliveryInvestment

}else{

profit = (price - costPerShirt)*qty

}

totalSales += saleValue
totalProfit += profit
shirtsSold += qty

document.getElementById("salesTotal").innerText="₹"+totalSales
document.getElementById("profitTotal").innerText="₹"+totalProfit
document.getElementById("shirtSold").innerText=shirtsSold

let month=date.substring(0,7)

if(!monthlySales[month]){
monthlySales[month]=0
monthlyProfit[month]=0
}

monthlySales[month]+=saleValue
monthlyProfit[month]+=profit

updateCharts()

let row=`
<tr>
<td>${date}</td>
<td>₹${price}</td>
<td>${qty}</td>
<td>₹${delivery}</td>
<td>${paidBy}</td>
<td>₹${profit.toFixed(2)}</td>
</tr>
`

document.getElementById("salesTable").innerHTML+=row

}

/* CHARTS */

let salesChart
let profitChart

function updateCharts(){

let months=Object.keys(monthlySales)

let salesData=Object.values(monthlySales)
let profitData=Object.values(monthlyProfit)

if(salesChart){
salesChart.destroy()
profitChart.destroy()
}

salesChart=new Chart(
document.getElementById("salesChart"),
{
type:"line",
data:{
labels:months,
datasets:[{
label:"Monthly Sales",
data:salesData,
borderWidth:3,
tension:0.4
}]
}
}
)

profitChart=new Chart(
document.getElementById("profitChart"),
{
type:"line",
data:{
labels:months,
datasets:[{
label:"Monthly Profit",
data:profitData,
borderWidth:3,
tension:0.4
}]
}
}
)

}

</script>

</body>
</html>
