<!DOCTYPE html>
<html>
<head>

<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:radial-gradient(circle,#1a1a1a,#000);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:25px;
}

.logo{
width:320px;
max-width:90%;
}

/* LAYOUT */

.container{
display:flex;
gap:25px;
padding:25px;
}

/* SIDEBAR */

.sidebar{
width:220px;
padding:25px;
border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:10px;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.1);
color:white;

cursor:pointer;
}

.sidebar button:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
flex:1;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
padding:20px;
border-radius:20px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.1);

text-align:center;
}

.card p{
font-size:28px;
}

/* PANELS */

.panel{
margin-top:20px;
padding:20px;

border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */

input{
padding:8px;
margin:5px;

border:none;
border-radius:6px;

background:rgba(255,255,255,0.1);
color:white;
}

button.action{
padding:8px 15px;
margin-top:8px;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.2);
color:white;

cursor:pointer;
}

.section{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<div class="header">
<img src="nuno-logo.png" class="logo">
</div>

<div class="container">

<div class="sidebar">

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('salesSection')">Sales</button>
<button onclick="showSection('investmentSection')">Investments</button>
<button onclick="showSection('analyticsSection')">Analytics</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="salesTotal">0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investmentTotal">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profitTotal">0</p>
</div>

</div>

</div>

<!-- SALES -->

<div id="salesSection" class="section panel">

<h3>Add Sale</h3>

<input type="number" id="saleAmount" placeholder="Sale Amount">

<button class="action" onclick="addSale()">Add Sale</button>

</div>

<!-- INVESTMENT -->

<div id="investmentSection" class="section panel">

<h3>Add Investment</h3>

<input type="number" id="printing" placeholder="Printing Cost"><br>
<input type="number" id="product" placeholder="Product Purchase"><br>
<input type="number" id="packaging" placeholder="Packaging Cost"><br>
<input type="number" id="other" placeholder="Other Expense"><br>

<button class="action" onclick="addInvestment()">Add Investment</button>

</div>

<!-- ANALYTICS -->

<div id="analyticsSection" class="section panel">

<h3>Monthly Growth</h3>

<canvas id="growthChart"></canvas>

</div>

</div>

</div>

<script>

function showSection(id){

document.querySelectorAll(".section").forEach(section=>{
section.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

let totalSales=0
let totalInvestment=0

function addSale(){

let sale=Number(document.getElementById("saleAmount").value)

totalSales+=sale

update()

}

function addInvestment(){

let printing=Number(document.getElementById("printing").value)
let product=Number(document.getElementById("product").value)
let packaging=Number(document.getElementById("packaging").value)
let other=Number(document.getElementById("other").value)

totalInvestment+=printing+product+packaging+other

update()

}

function update(){

document.getElementById("salesTotal").innerText="₹"+totalSales
document.getElementById("investmentTotal").innerText="₹"+totalInvestment

let profit=totalSales-totalInvestment

document.getElementById("profitTotal").innerText="₹"+profit

}

const ctx=document.getElementById('growthChart')

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Growth',
data:[0,0,0,0,0,0],
borderWidth:3,
tension:0.4
}]
}
})

</script>

</body>
</html>
