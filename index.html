<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuno Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* Glass UI */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
}

/* Buttons */
button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Inputs */
input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

/* Mobile Fix */
@media(max-width:600px){
  .row {
    display: flex;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<h2 style="text-align:center;">NUNO WEARS DASHBOARD</h2>

<!-- SALES -->
<div class="glass">
  <h3>Sales</h3>

  <input type="date" id="date">
  <input type="number" id="price" placeholder="Total Price">
  <input type="number" id="qty" placeholder="T-shirt Count">

  <select id="delivery">
    <option value="customer">Customer Pays</option>
    <option value="company">Company Pays</option>
  </select>

  <input type="number" id="deliveryCost" placeholder="Delivery Cost">

  <button onclick="addSale()">Add</button>

  <div id="salesList"></div>
</div>

<!-- INVESTMENT -->
<div class="glass">
  <h3>Investment</h3>

  <input type="month" id="month">
  <input type="number" id="purchase" placeholder="Purchase Cost">
  <input type="number" id="count" placeholder="T-shirt Count">
  <input type="number" id="printing" placeholder="Printing Cost">

  <button onclick="addInvestment()">Add</button>

  <div id="investmentList"></div>
</div>

<!-- INVENTORY -->
<div class="glass">
  <h3>Inventory</h3>

  <input type="text" id="design" placeholder="Design Name">
  <input type="number" id="stock" placeholder="Stock">

  <button onclick="addInventory()">Add</button>

  <div id="inventoryList"></div>
</div>

<!-- DASHBOARD -->
<div class="glass">
  <h3>Dashboard</h3>

  <p>Total Sales: <span id="totalSales">0</span></p>
  <p>Total Investment: <span id="totalInvestment">0</span></p>
  <p>Profit: <span id="profit">0</span></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* DATA */
let sales = [];
let investments = [];
let inventory = [];

/* SAVE */
async function saveData() {
  await db.collection("nunoData").doc("main").set({
    sales, investments, inventory
  });
}

/* LOAD */
async function loadData() {
  const doc = await db.collection("nunoData").doc("main").get();
  if (doc.exists) {
    let data = doc.data();
    sales = data.sales || [];
    investments = data.investments || [];
    inventory = data.inventory || [];
    updateUI();
  }
}

/* SALES */
function addSale() {
  let s = {
    date: date.value,
    price: Number(price.value),
    qty: Number(qty.value),
    delivery: delivery.value,
    deliveryCost: Number(deliveryCost.value)
  };

  sales.push(s);

  if (s.delivery === "company") {
    s.price -= s.deliveryCost;
  }

  saveData();
  updateUI();
}

/* INVESTMENT */
function addInvestment() {
  let inv = {
    month: month.value,
    purchase: Number(purchase.value),
    count: Number(count.value),
    printing: Number(printing.value)
  };

  inv.total = inv.purchase + inv.printing;

  investments.push(inv);

  saveData();
  updateUI();
}

/* INVENTORY */
function addInventory() {
  let item = {
    design: design.value,
    stock: Number(stock.value)
  };

  inventory.push(item);

  saveData();
  updateUI();
}

/* UI UPDATE */
function updateUI() {
  let totalSales = 0;
  let totalInvestment = 0;

  salesList.innerHTML = "";
  investmentList.innerHTML = "";
  inventoryList.innerHTML = "";

  sales.forEach((s, i) => {
    totalSales += s.price;

    salesList.innerHTML += `
      <p>${s.date} | ₹${s.price} | Qty: ${s.qty}
      <button onclick="deleteSale(${i})">🗑</button></p>
    `;
  });

  investments.forEach((i, index) => {
    totalInvestment += i.total;

    investmentList.innerHTML += `
      <p>${i.month} | ₹${i.total}
      <button onclick="deleteInvestment(${index})">🗑</button></p>
    `;
  });

  inventory.forEach((i, index) => {
    inventoryList.innerHTML += `
      <p>${i.design} | Stock: ${i.stock}
      <button onclick="deleteInventory(${index})">🗑</button></p>
    `;
  });

  document.getElementById("totalSales").innerText = totalSales;
  document.getElementById("totalInvestment").innerText = totalInvestment;
  document.getElementById("profit").innerText = totalSales - totalInvestment;
}

/* DELETE */
function deleteSale(i){
  sales.splice(i,1);
  saveData();
  updateUI();
}

function deleteInvestment(i){
  investments.splice(i,1);
  saveData();
  updateUI();
}

function deleteInventory(i){
  inventory.splice(i,1);
  saveData();
  updateUI();
}

/* LOAD ON START */
loadData();

</script>

</body>
</html>
