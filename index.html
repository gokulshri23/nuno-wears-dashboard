<!DOCTYPE html>
<html>
<head>

<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BACKGROUND */

body{
margin:0;
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background: radial-gradient(circle at top,#1a1a1a,#000000);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:30px;
}

.logo{
width:320px;
opacity:0.95;
}

/* LAYOUT */

.container{
display:flex;
gap:30px;
padding:30px;
}

/* SIDEBAR */

.sidebar{
width:220px;
padding:25px;
border-radius:20px;

background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 10px 40px rgba(0,0,0,0.6),
inset 0 1px 1px rgba(255,255,255,0.1);
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
opacity:0.8;
font-size:15px;
}

.sidebar a:hover{
opacity:1;
}

/* MAIN */

.main{
flex:1;
}

/* CARDS */

.cards{
display:flex;
gap:25px;
margin-bottom:25px;
}

.card{

flex:1;
padding:25px;
border-radius:20px;

background: rgba(255,255,255,0.06);
backdrop-filter: blur(20px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 20px 60px rgba(0,0,0,0.7),
inset 0 1px 1px rgba(255,255,255,0.15);

text-align:center;
}

.card h3{
margin-bottom:10px;
font-weight:500;
}

.card p{
font-size:28px;
margin:0;
}

/* PANELS */

.panel{

padding:25px;
margin-top:25px;
border-radius:20px;

background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 20px 60px rgba(0,0,0,0.7),
inset 0 1px 1px rgba(255,255,255,0.15);

}

/* INPUTS */

input{

padding:10px;
margin:8px 5px;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.08);
color:white;

outline:none;
}

button{

padding:10px 18px;
margin-top:10px;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.15);
color:white;

cursor:pointer;
}

button:hover{
background:rgba(255,255,255,0.25);
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
<img src="nuno-logo.png" class="logo">
</div>

<div class="container">

<div class="sidebar">

<a href="#">Dashboard</a>
<a href="#">Sales</a>
<a href="#">Investments</a>
<a href="#">Analytics</a>
<a href="#">Goals</a>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investment">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">0</p>
</div>

</div>

<div class="panel">

<h3>Add Sale</h3>

<input type="number" id="saleAmount" placeholder="Sale Amount">

<button onclick="addSale()">Add</button>

</div>

<div class="panel">

<h3>Add Investment</h3>

<input type="number" id="printing" placeholder="Printing Cost"><br>
<input type="number" id="product" placeholder="Product Purchase"><br>
<input type="number" id="packaging" placeholder="Packaging Cost"><br>
<input type="number" id="other" placeholder="Other Expense"><br>

<button onclick="addInvestment()">Add Investment</button>

</div>

<div class="panel">

<h3>Monthly Growth</h3>

<canvas id="growthChart"></canvas>

</div>

</div>

</div>

<script>

let totalSales=0;
let totalInvestment=0;

function addSale(){

let sale=Number(document.getElementById("saleAmount").value);

totalSales+=sale;

updateDashboard();

}

function addInvestment(){

let printing=Number(document.getElementById("printing").value);
let product=Number(document.getElementById("product").value);
let packaging=Number(document.getElementById("packaging").value);
let other=Number(document.getElementById("other").value);

totalInvestment+=printing+product+packaging+other;

updateDashboard();

}

function updateDashboard(){

document.getElementById("sales").innerText="₹"+totalSales;
document.getElementById("investment").innerText="₹"+totalInvestment;

let profit=totalSales-totalInvestment;

document.getElementById("profit").innerText="₹"+profit;

}

const ctx=document.getElementById('growthChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Monthly Growth',
data:[0,0,0,0,0,0],
borderWidth:3,
tension:0.4
}]
}
});

</script>

</body>
</html>
