<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuno Wears Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:linear-gradient(135deg,#0f0f0f,#000);
color:white;
}

/* header */

.header{
text-align:center;
padding:20px;
}

.logo{
width:140px;
display:block;
margin:auto;
}

/* layout */

.container{
display:flex;
gap:15px;
padding:15px;
}

.sidebar{
width:200px;
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:10px;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
}

.main{
flex:1;
min-width:0;
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.card{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.07);
text-align:center;
}

/* panel */

.panel{
margin-top:15px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.05);
}

.form-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
}

input,select{
padding:8px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.1);
color:white;
width:100%;
}

button.action{
padding:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.25);
color:white;
cursor:pointer;
}

/* table */

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th,td{
padding:8px;
text-align:center;
}

tr{
border-bottom:1px solid rgba(255,255,255,0.15);
}

/* low stock */

.low{
color:red;
font-weight:bold;
}

/* section */

.section{display:none;}
.active{display:block;}

/* mobile */

@media(max-width:900px){

.container{flex-direction:column;}

.sidebar{
display:flex;
width:100%;
overflow:auto;
}

.sidebar button{
flex:1;
font-size:12px;
margin:3px;
}

.cards{grid-template-columns:1fr 1fr;}
.form-grid{grid-template-columns:1fr 1fr;}

}

</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<h2>Nuno Wears</h2>
</div>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('sales')">Sales</button>
<button onclick="show('investment')">Investment</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('analytics')">Analytics</button>
</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">
<div class="cards">

<div class="card">Sales<br><span id="salesTotal">₹0</span></div>
<div class="card">Investment<br><span id="investmentTotal">₹0</span></div>
<div class="card">Profit<br><span id="profitTotal">₹0</span></div>
<div class="card">Sold<br><span id="shirtSold">0</span></div>
<div class="card">Delivery<br><span id="deliveryTotal">₹0</span></div>

</div>
</div>

<!-- SALES -->

<div id="sales" class="section panel">

<div class="form-grid">

<input type="date" id="date">
<select id="design"></select>
<input type="number" id="price" placeholder="Price">
<input type="number" id="qty" placeholder="Qty">
<input type="number" id="delivery" placeholder="Delivery">

<select id="paid">
<option value="customer">Customer</option>
<option value="company">Company</option>
</select>

<button class="action" onclick="addSale()">Add</button>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Date</th><th>Design</th><th>Price</th><th>Qty</th>
<th>Delivery</th><th>Profit</th><th>Delete</th>
</tr>
</thead>
<tbody id="salesTable"></tbody>
</table>
</div>

<button onclick="undoDelete('sales')">Undo Delete</button>

</div>

<!-- INVESTMENT -->

<div id="investment" class="section panel">

<div class="form-grid">

<input type="month" id="month">
<input type="number" id="purchase" placeholder="Purchase">
<input type="number" id="printing" placeholder="Printing">
<input type="number" id="packing" placeholder="Packing">
<input type="number" id="count" placeholder="Qty">

<button onclick="addInvestment()">Add</button>

</div>

<table>
<tbody id="investmentTable"></tbody>
</table>

<button onclick="undoDelete('investment')">Undo Delete</button>

</div>

<!-- INVENTORY -->

<div id="inventory" class="section panel">

<div class="form-grid">

<input id="dname" placeholder="Design">
<input id="dqty" type="number" placeholder="Qty">

<button onclick="addInventory()">Add</button>

</div>

<table>
<tbody id="inventoryTable"></tbody>
</table>

<button onclick="undoDelete('inventory')">Undo Delete</button>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section panel">

<canvas id="salesChart"></canvas>
<canvas id="dailyChart"></canvas>

</div>

</div>
</div>

<script>

/* navigation */

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* data */

let salesData=[]
let investmentData=[]
let inventoryData=[]

let deletedStack={sales:[],investment:[],inventory:[]}

/* inventory */

function addInventory(){
inventoryData.push({name:dname.value,printed:+dqty.value,sold:0})
renderInventory()
updateDesign()
}

function renderInventory(){

inventoryTable.innerHTML=""

inventoryData.forEach((i,ind)=>{

let rem=i.printed-i.sold
let lowClass = rem<=5 ? "low" : ""

inventoryTable.innerHTML+=`
<tr class="${lowClass}">
<td>${i.name}</td>
<td>${i.printed}</td>
<td>${i.sold}</td>
<td>${rem}</td>
<td><button onclick="del('inventory',${ind})">❌</button></td>
</tr>
`
})

}

function updateDesign(){
design.innerHTML=""
inventoryData.forEach(i=>{
let op=document.createElement("option")
op.value=i.name
op.textContent=i.name
design.appendChild(op)
})
}

/* sales */

function addSale(){

let item=inventoryData.find(i=>i.name===design.value)

if(item.printed-item.sold<qty.value){alert("No stock");return;}

item.sold+=+qty.value

let profit=(price.value)*qty.value

if(paid.value==="company") profit-=+delivery.value

salesData.push({
date:date.value,
design:design.value,
price:+price.value,
qty:+qty.value,
delivery:+delivery.value,
paid:paid.value,
profit
})

renderSales()
renderInventory()
updateDashboard()
updateChart()

}

function renderSales(){

salesTable.innerHTML=""

salesData.forEach((s,i)=>{

salesTable.innerHTML+=`
<tr>
<td>${s.date}</td>
<td>${s.design}</td>
<td>${s.price}</td>
<td>${s.qty}</td>
<td>${s.delivery}</td>
<td>${s.profit}</td>
<td><button onclick="del('sales',${i})">❌</button></td>
</tr>
`

})

}

/* investment */

function addInvestment(){

let total=+purchase.value + +printing.value + +packing.value

investmentData.push({
month:month.value,
total
})

renderInvestment()
updateDashboard()

}

function renderInvestment(){

investmentTable.innerHTML=""

investmentData.forEach((i,ind)=>{

investmentTable.innerHTML+=`
<tr>
<td>${i.month}</td>
<td>${i.total}</td>
<td><button onclick="del('investment',${ind})">❌</button></td>
</tr>
`

})

}

/* delete + undo */

function del(type,index){

deletedStack[type].push(eval(type+"Data")[index])
eval(type+"Data").splice(index,1)

renderAll()
}

function undoDelete(type){

if(deletedStack[type].length===0) return

eval(type+"Data").push(deletedStack[type].pop())

renderAll()
}

function renderAll(){
renderSales()
renderInventory()
renderInvestment()
updateDashboard()
}

/* dashboard */

function updateDashboard(){

let sales=0,profit=0,delivery=0,sold=0,invest=0

salesData.forEach(s=>{
sales+=s.price*s.qty
profit+=s.profit
sold+=s.qty
if(s.paid==="company") delivery+=s.delivery
})

investmentData.forEach(i=>invest+=i.total)

salesTotal.innerText="₹"+sales
profitTotal.innerText="₹"+profit
investmentTotal.innerText="₹"+invest
shirtSold.innerText=sold
deliveryTotal.innerText="₹"+delivery

}

/* chart */

let chart

function updateChart(){

let data={}

salesData.forEach(s=>{
data[s.date]=(data[s.date]||0)+(s.price*s.qty)
})

let labels=Object.keys(data)
let values=Object.values(data)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("dailyChart"),{
type:"line",
data:{labels:labels,datasets:[{data:values,label:"Daily Sales"}]}
})

}

</script>

</body>
</html>
