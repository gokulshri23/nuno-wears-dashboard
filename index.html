<!DOCTYPE html>
<html>
<head>
<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:200px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
margin-top:5px;
cursor:pointer;
}

.chart{
width:70%;
margin:auto;
margin-top:40px;
}

</style>

</head>

<body>

<h1>NUNO WEARS DASHBOARD</h1>

<div class="container">

<div class="card">
<h3>Total Sales</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investment">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">0</p>
</div>

</div>

<h2>Add Sale</h2>

<input type="number" id="saleAmount" placeholder="Sale Amount">
<br>
<button onclick="addSale()">Add Sale</button>

<h2>Investment</h2>

<input type="number" id="printing" placeholder="Printing Cost"><br>
<input type="number" id="product" placeholder="Product Purchase"><br>
<input type="number" id="packaging" placeholder="Packaging Cost"><br>
<input type="number" id="other" placeholder="Other Expense"><br>

<button onclick="addInvestment()">Add Investment</button>

<div class="chart">
<canvas id="growthChart"></canvas>
</div>

<script>

let totalSales=0;
let totalInvestment=0;

function addSale(){

let sale=document.getElementById("saleAmount").value;

totalSales+=Number(sale);

updateDashboard();

}

function addInvestment(){

let printing=Number(document.getElementById("printing").value);
let product=Number(document.getElementById("product").value);
let packaging=Number(document.getElementById("packaging").value);
let other=Number(document.getElementById("other").value);

totalInvestment+=printing+product+packaging+other;

updateDashboard();

}

function updateDashboard(){

document.getElementById("sales").innerText="₹"+totalSales;
document.getElementById("investment").innerText="₹"+totalInvestment;

let profit=totalSales-totalInvestment;

document.getElementById("profit").innerText="₹"+profit;

}

const ctx=document.getElementById('growthChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May'],
datasets:[{
label:'Monthly Growth',
data:[0,0,0,0,0],
borderWidth:2
}]
}

});

</script>

</body>
</html>
