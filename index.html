<!DOCTYPE html>
<html>

<head>

<title>Nuno Wears Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:radial-gradient(circle,#1a1a1a,#000);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:25px;
}

.logo{
width:300px;
}

/* LAYOUT */

.container{
display:flex;
gap:25px;
padding:25px;
}

/* SIDEBAR */

.sidebar{
width:220px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:rgba(255,255,255,0.25);
}

/* MAIN */

.main{
flex:1;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

.card p{
font-size:28px;
}

/* PANELS */

.panel{
margin-top:20px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */

input{
padding:8px;
margin:6px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.1);
color:white;
}

/* remove number arrows */

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
-webkit-appearance:none;
margin:0;
}

input[type=number]{
-moz-appearance:textfield;
}

button.action{
padding:8px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.25);
color:white;
cursor:pointer;
}

/* TABLE */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

tr{
border-bottom:1px solid rgba(255,255,255,0.15);
}

/* SECTIONS */

.section{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<div class="header">
<img src="nuno-logo.png" class="logo">
</div>

<div class="container">

<div class="sidebar">

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('sales')">Sales</button>
<button onclick="showSection('investment')">Investment</button>
<button onclick="showSection('analytics')">Analytics</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="salesTotal">₹0</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p id="investmentTotal">₹0</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="profitTotal">₹0</p>
</div>

</div>

</div>

<!-- SALES -->

<div id="sales" class="section panel">

<h3>Add Sale</h3>

<input type="date" id="saleDate">

<input type="number" id="salePrice" placeholder="Selling Price">

<button class="action" onclick="addSale()">Add Sale</button>

<table>

<tr>
<th>Date</th>
<th>Price</th>
<th>Profit</th>
</tr>

<tbody id="salesTable"></tbody>

</table>

</div>

<!-- INVESTMENT -->

<div id="investment" class="section panel">

<h3>Monthly Investment</h3>

<input type="month" id="invMonth">

<input type="number" id="purchaseCost" placeholder="Total T-shirt Purchase Cost">

<input type="number" id="printingCost" placeholder="Printing Cost">

<input type="number" id="shirtCount" placeholder="Number of T-shirts Bought">

<input type="number" id="deliveryCost" placeholder="Delivery Charges">

<input type="number" id="packingCost" placeholder="Packing Cost">

<br>

<button class="action" onclick="addInvestment()">Add Investment</button>

<table>

<tr>
<th>Month</th>
<th>Purchase</th>
<th>Printing</th>
<th>Delivery</th>
<th>Packing</th>
<th>Qty</th>
<th>Cost per Shirt</th>
<th>Total Investment</th>
</tr>

<tbody id="investmentTable"></tbody>

</table>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section panel">

<h3>Growth Chart</h3>

<canvas id="growthChart"></canvas>

</div>

</div>

</div>

<script>

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

/* DATA */

let costPerShirt=0
let totalSales=0
let totalInvestment=0
let totalProfit=0

function addInvestment(){

let month=document.getElementById("invMonth").value
let purchase=Number(document.getElementById("purchaseCost").value)
let printing=Number(document.getElementById("printingCost").value)
let qty=Number(document.getElementById("shirtCount").value)
let delivery=Number(document.getElementById("deliveryCost").value)
let packing=Number(document.getElementById("packingCost").value)

if(!month || !purchase || !qty){

alert("Enter required fields")
return

}

let monthlyInvestment = purchase + printing + delivery + packing

costPerShirt = monthlyInvestment / qty

totalInvestment += monthlyInvestment

document.getElementById("investmentTotal").innerText="₹"+totalInvestment

let row=`
<tr>
<td>${month}</td>
<td>₹${purchase}</td>
<td>₹${printing}</td>
<td>₹${delivery}</td>
<td>₹${packing}</td>
<td>${qty}</td>
<td>₹${costPerShirt.toFixed(2)}</td>
<td>₹${monthlyInvestment}</td>
</tr>
`

document.getElementById("investmentTable").innerHTML+=row

}

function addSale(){

let date=document.getElementById("saleDate").value
let price=Number(document.getElementById("salePrice").value)

if(!date || !price){

alert("Enter date and price")
return

}

let profit=price-costPerShirt

totalSales+=price
totalProfit+=profit

document.getElementById("salesTotal").innerText="₹"+totalSales
document.getElementById("profitTotal").innerText="₹"+totalProfit

let row=`
<tr>
<td>${date}</td>
<td>₹${price}</td>
<td>₹${profit.toFixed(2)}</td>
</tr>
`

document.getElementById("salesTable").innerHTML+=row

}

/* CHART */

const ctx=document.getElementById("growthChart")

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Growth',
data:[0,0,0,0,0,0],
borderWidth:3,
tension:0.4
}]
}
})

</script>

</body>
</html>
